services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: flowops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowops
      POSTGRES_PASSWORD: flowops
      POSTGRES_DB: flowops
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowops']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowops_net

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowops_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowops_net

  # ─── NestJS API ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: flowops_api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - flowops_net

volumes:
  postgres_data:
  redis_data:

networks:
  flowops_net:
    driver: bridge
